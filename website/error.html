<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Multi-Region DR Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .error-code {
      font-size: 96px;
      font-weight: 800;
      color: #ef4444;
      letter-spacing: -4px;
      line-height: 1;
      margin-bottom: 16px;
      opacity: 0.8;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #e2e8f0;
    }

    p {
      font-size: 15px;
      color: #64748b;
      max-width: 360px;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    a {
      display: inline-block;
      background: #1a1f2e;
      border: 1px solid rgba(59,130,246,0.3);
      color: #3b82f6;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    a:hover { background: rgba(59,130,246,0.1); }
  </style>
</head>
<body>

  <div class="error-code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist in this bucket. This is the S3 error document for the Multi-Region DR demo.</p>
  <a href="/">Go to homepage</a>

</body>
</html>
